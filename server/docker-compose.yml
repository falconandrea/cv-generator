version: "3.9"

services:
  cv-generator:
    container_name: cv-generator
    image: ghcr.io/falconandrea/craftcv.online:main
    restart: unless-stopped
    env_file:
      - .env          # file sul server con le variabili sensibili (non committato)
    environment:
      - HOST=0.0.0.0
      - PORT=3001
      - NODE_ENV=production
      # Le variabili AI vengono dal .env file
      # AI_PROVIDER_BASE_URL
      # AI_PROVIDER_API_KEY
      # AI_PROVIDER_MODEL
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # ======================
      # HTTP → HTTPS redirect
      # ======================
      - "traefik.http.middlewares.cv-generator-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.cv-generator-https-redirect.redirectscheme.permanent=true"

      # ======================
      # WWW → non-WWW redirect
      # ======================
      - "traefik.http.middlewares.cv-generator-www-redirect.redirectregex.regex=^https?://www\\.(.*)"
      - "traefik.http.middlewares.cv-generator-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.cv-generator-www-redirect.redirectregex.permanent=true"

      - "traefik.http.routers.cv-generator-http.entrypoints=http"
      - "traefik.http.routers.cv-generator-http.rule=Host(`craftcv.online`) || Host(`www.craftcv.online`)"
      - "traefik.http.routers.cv-generator-http.middlewares=cv-generator-https-redirect"

      # ======================
      # HTTPS router
      # ======================
      - "traefik.http.routers.cv-generator-secure.entrypoints=https"
      - "traefik.http.routers.cv-generator-secure.rule=Host(`craftcv.online`) || Host(`www.craftcv.online`)"
      - "traefik.http.routers.cv-generator-secure.tls=true"
      - "traefik.http.routers.cv-generator-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cv-generator-secure.middlewares=cv-generator-www-redirect"
      - "traefik.http.routers.cv-generator-secure.service=cv-generator"

      # ======================
      # Service
      # ======================
      - "traefik.http.services.cv-generator.loadbalancer.server.port=3001"

      # rete corretta per Traefik
      - "traefik.docker.network=web"

networks:
  web:
    external: true
